name: Neural Network Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  pipeline-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup CML
        uses: iterative/setup-cml@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run local training
        run: |
          python training/train_local_model.py

      - name: Validate checkpoint
        run: |
          python model_cd/validate_checkpoint.py

      - name: Generate CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "# Neural Network CI Report" > report.md
          echo "" >> report.md
          echo "## Validation Result" >> report.md
          cat reports/validation_result.json >> report.md
          echo "" >> report.md
          echo "## Confusion Matrix" >> report.md
          echo "![Confusion Matrix](reports/figures/confusion_matrix.png)" >> report.md
          echo "" >> report.md
          echo "## Validation Decision" >> report.md
          echo "![Validation Decision](reports/figures/validation_decision.png)" >> report.md
          cml comment create report.md
name: Neural Network Pipeline CI/CD

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write
  issues: write
  statuses: write

jobs:
  cicd-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup CML
        uses: iterative/setup-cml@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check project structure
        run: |
          test -f training/train_local_model.py
          test -f training/evaluate_model.py
          test -f training/validate_model.py
          test -f training/run_training_pipeline.py
          test -f training/trigger_model_cd.py

          test -f model_cd/register_model.py
          test -f model_cd/deploy_model.py
          test -f model_cd/validate_endpoint.py
          test -f model_cd/clearml_model_cd_pipeline.py
          test -f model_cd/run_model_cd.py

          test -f app/serve_model.py

          test -f feedback/simulate_new_data.py
          test -f feedback/retrain_trigger.py

          test -f monitoring/monitor_model.py

          test -f pipeline_cd/deploy_pipeline.py

      - name: Generate CI report
        run: |
          mkdir -p reports
          echo '{ "pipeline_ci_status": "passed", "purpose": "validate ML pipeline code, not train production model" }' > reports/pipeline_ci_result.json

      - name: Run Pipeline CD
        run: |
          python pipeline_cd/deploy_pipeline.py

      - name: Generate CML report
        run: |
          echo "# Neural Network Pipeline CI/CD Report" > report.md
          echo "" >> report.md

          echo "## Pipeline Status" >> report.md
          echo "| Stage | Status | Purpose |" >> report.md
          echo "|---|---|---|" >> report.md
          echo "| Pipeline CI | Passed | Validates ML pipeline structure and dependencies |" >> report.md
          echo "| Pipeline CD | Deployed | Packages pipeline infrastructure into staging |" >> report.md
          echo "| Staging | Ready | Stores deployment-ready workflow components |" >> report.md
          echo "" >> report.md

          echo "## CI/CD Execution Flow" >> report.md
          echo '```text' >> report.md
          echo "Code Push / Pull Request" >> report.md
          echo "        ↓" >> report.md
          echo "GitHub Actions Triggered" >> report.md
          echo "        ↓" >> report.md
          echo "Environment Setup" >> report.md
          echo "        ↓" >> report.md
          echo "ML Pipeline Structure Validation" >> report.md
          echo "        ↓" >> report.md
          echo "CI Report Generated" >> report.md
          echo "        ↓" >> report.md
          echo "Pipeline CD Executed" >> report.md
          echo "        ↓" >> report.md
          echo "Staging Infrastructure Prepared" >> report.md
          echo '```' >> report.md
          echo "" >> report.md

          echo "## Components Validated" >> report.md
          echo "- Training workflow scripts" >> report.md
          echo "- Model CD workflow scripts" >> report.md
          echo "- Flask serving application" >> report.md
          echo "- Monitoring script" >> report.md
          echo "- Feedback and retraining scripts" >> report.md
          echo "- Pipeline deployment script" >> report.md
          echo "" >> report.md

          echo "## Staging Deployment Summary" >> report.md
          echo "| Item | Description |" >> report.md
          echo "|---|---|" >> report.md
          echo "| Deployment Type | Pipeline CD |" >> report.md
          echo "| Stage | Staging |" >> report.md
          echo "| Target Folder | artifacts/pipeline_staging/ |" >> report.md
          echo "| Deployed Components | Serving app, monitoring script, Model CD workflows |" >> report.md
          echo "| Model Weights | Not deployed in this stage |" >> report.md
          echo "" >> report.md

          echo "## Raw CI Result" >> report.md
          echo '```json' >> report.md
          cat reports/pipeline_ci_result.json >> report.md
          echo '```' >> report.md

          echo "## Raw Pipeline CD Manifest" >> report.md
          echo '```json' >> report.md
          cat artifacts/pipeline_staging/pipeline_deployment_manifest.json >> report.md
          echo '```' >> report.md

      - name: Publish CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cml comment create report.md
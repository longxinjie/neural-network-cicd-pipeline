name: Neural Network Pipeline CI/CD

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write
  issues: write
  statuses: write

jobs:
  cicd-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup CML
        uses: iterative/setup-cml@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check project structure
        run: |
          test -f training/train_local_model.py
          test -f training/evaluate_model.py
          test -f training/validate_model.py
          test -f training/run_training_pipeline.py
          test -f training/trigger_model_cd.py

          test -f model_cd/register_model.py
          test -f model_cd/deploy_model.py
          test -f model_cd/validate_endpoint.py
          test -f model_cd/clearml_model_cd_pipeline.py
          test -f model_cd/run_model_cd.py

          test -f app/serve_model.py

          test -f feedback/simulate_new_data.py
          test -f feedback/retrain_trigger.py

          test -f monitoring/monitor_model.py

          test -f pipeline_cd/deploy_pipeline.py

      - name: Generate CI report
        run: |
          mkdir -p reports
          echo '{ "pipeline_ci_status": "passed", "purpose": "validate ML pipeline code, not train production model" }' > reports/pipeline_ci_result.json

      - name: Run Pipeline CD
        run: |
          python pipeline_cd/deploy_pipeline.py

      - name: Generate GitHub summary report
        run: |
          {
            echo "# Neural Network Pipeline CI/CD Report"
            echo ""
            echo "## Pipeline Status"
            echo "| Stage | Status | Purpose |"
            echo "|---|---|---|"
            echo "| Pipeline CI | Passed | Validates ML pipeline structure and dependencies |"
            echo "| Pipeline CD | Deployed | Packages pipeline infrastructure into staging |"
            echo "| Staging | Ready | Stores deployment-ready workflow components |"
            echo ""
            
            echo "## CI/CD Execution Flow"
            echo '```text'
            echo "Code Push / Pull Request"
            echo "        ↓"
            echo "GitHub Actions Triggered"
            echo "        ↓"
            echo "Environment Setup"
            echo "        ↓"
            echo "ML Pipeline Structure Validation"
            echo "        ↓"
            echo "CI Report Generated"
            echo "        ↓"
            echo "Pipeline CD Executed"
            echo "        ↓"
            echo "Staging Infrastructure Prepared"
            echo '```'
            echo ""

            echo "## Components Validated"
            echo "- Training workflow scripts"
            echo "- Model CD workflow scripts"
            echo "- Flask serving application"
            echo "- Monitoring script"
            echo "- Feedback and retraining scripts"
            echo "- Pipeline deployment script"
            echo ""

            echo "## Staging Deployment Summary"
            echo "| Item | Description |"
            echo "|---|---|"
            echo "| Deployment Type | Pipeline CD |"
            echo "| Stage | Staging |"
            echo "| Target Folder | artifacts/pipeline_staging/ |"
            echo "| Deployed Components | Serving app, monitoring script, Model CD workflows |"
            echo "| Model Weights | Not deployed in this stage |"
            echo ""

            echo "## Architecture Distinction"
            echo "| Layer | Role |"
            echo "|---|---|"
            echo "| Pipeline CI | Validates ML pipeline code and project structure |"
            echo "| Pipeline CD | Deploys pipeline infrastructure to staging |"
            echo "| Model CD | Handles trained model registration and delivery separately |"
            echo ""

            echo "## Raw CI Result"
            echo '```json'
            cat reports/pipeline_ci_result.json
            echo '```'
            echo ""

            echo "## Raw Pipeline CD Manifest"
            echo '```json'
            cat artifacts/pipeline_staging/pipeline_deployment_manifest.json
            echo '```'
          } >> $GITHUB_STEP_SUMMARY